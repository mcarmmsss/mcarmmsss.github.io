<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>🌸 Mc's Workspace 🌸</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600&display=swap" rel="stylesheet">
  <style>
    body { margin:0; font-family:'Montserrat',sans-serif; background:#ffeaf3 url('images/bg.jpg') center/cover no-repeat fixed; color:#5a3b4d; min-height:100vh; }
    header { text-align:center; padding:20px; font-size:2.2rem; font-weight:600; background:#ffd6e8; border-bottom:4px solid #ff9fcf; }
    .container { display:grid; grid-template-columns:2fr 1fr; gap:20px; padding:20px; max-width:1400px; margin:0 auto; }
    .card { background:rgba(255,255,255,0.92); border-radius:20px; padding:20px; box-shadow:0 8px 20px rgba(0,0,0,0.1); border:2px solid #ffccdd; }
    h2 { margin-top:0; color:#ff7fbf; display:flex; align-items:center; gap:8px; }
    button { background:#ff9fcf; border:none; padding:12px 18px; border-radius:999px; cursor:pointer; font-family:'Montserrat',sans-serif; margin:6px 4px; color:white; font-weight:600; }
    button:hover { background:#ff7fbf; }
    button:disabled { opacity:0.5; cursor:not-allowed; }
    .choices button { min-width:140px; margin:8px; }
    select,input,textarea { width:100%; padding:10px; border-radius:12px; border:2px solid #ffccdd; margin-bottom:12px; font-family:'Montserrat',sans-serif; box-sizing:border-box; }
    textarea { height:140px; }
    .timer { font-size:2.2rem; text-align:center; margin:15px 0; color:#ff7fbf; font-weight:600; }
    .sparkle { position:fixed; font-size:2rem; animation:pop 0.8s ease-out forwards; pointer-events:none; }
    @keyframes pop { from{opacity:1;transform:scale(1);} to{opacity:0;transform:scale(2.5);} }
    .sticker { position:fixed; width:80px; opacity:0.9; pointer-events:none; animation:float 6s ease-in-out infinite; }
    @keyframes float { 0%,100%{transform:translateY(0) rotate(0deg);} 50%{transform:translateY(-20px) rotate(5deg);} }
    #customizer { display:none; margin-top:20px; padding:15px; background:#fff5f9; border-radius:16px; border:2px dashed #ffccdd; }
    #customizer.show { display:block; animation:slideDown 0.4s ease-out; }
    @keyframes slideDown { from{opacity:0;transform:translateY(-10px);} to{opacity:1;transform:translateY(0);} }
    label { display:block; margin-top:12px; font-weight:600; color:#ff7fbf; }
    #typedAnswer { font-size:1.2rem; }
    #feedback { font-size:1.3rem; margin:15px 0; min-height:1.5em; }
    img.question-img { max-width:90%; max-height:400px; border-radius:16px; margin:15px auto; display:block; box-shadow:0 4px 15px rgba(0,0,0,0.15); }
    /* Modal for GIF celebration */
    .milestone-modal {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
      cursor: pointer;
    }
    .milestone-modal .close-text {
      position: absolute;
      bottom: 20px;
      color: white;
      font-size: 1.3rem;
      font-weight: 600;
      text-shadow: 0 0 10px black;
    }
    /* Bigger pink checkbox */
    #toggleImages {
      accent-color: #ff9fcf;
      background-color: #fff0f5;
      width: 3em;
      height: 3em;
      border: 3px solid #ff9fcf;
      border-radius: 6px;
      cursor: pointer;
      appearance: none;
      position: relative;
      margin: 0;
    }
    #toggleImages:checked {
      background-color: #ff9fcf;
      border-color: #ff7fbf;
    }
    #toggleImages:checked::after {
      content: "♡";
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: white;
      font-size: 1.8rem;
      font-weight: bold;
    }
  </style>
</head>
<body>
<header>🌸 Mc's Workspace 🌸 💕</header>
<div class="container">
  <!-- FLASHCARDS -->
  <div class="card">
    <h2>📚 Flashcards 💖</h2>
    <select id="mainTopicSelect"></select>
    <select id="subjectSelect" disabled style="margin:10px 0;"></select>
    <select id="deckSelect" disabled></select>
    <select id="modeSelect" style="margin:10px 0;">
      <option value="multiple">Multiple Choice (Term → Description)</option>
      <option value="reversed">Reversed MC (Description → Term)</option>
      <option value="identification">Identification (Type the Term/Name)</option>
    </select>

    <!-- Image toggle – closer text, 3× bigger, pink -->
    <label style="display:flex; align-items:center; gap:4px; margin:12px 0; font-size:1.1rem; color:#ff7fbf; cursor:pointer;">
      <input type="checkbox" id="toggleImages" checked>
      Show images in questions ♡
    </label>

    <div id="question" style="font-size:1.4rem; margin:20px 0; text-align:center;"></div>
    <div id="choices" class="choices"></div>
    <div id="typedArea" style="display:none;">
      <input type="text" id="typedAnswer" placeholder="Type the term/name here...">
      <button onclick="checkTyped()">Submit ♡</button>
      <div id="feedback"></div>
    </div>
    <p>Score: <span id="score">0</span> 🎀 <span id="savedScore"></span></p>
    <button id="nextBtn" onclick="nextQuestion()" disabled>Next ♡</button>
  </div>
  <!-- SIDE PANEL -->
  <div class="card">
    <h2>📝 Notes 🎀</h2>
    <textarea placeholder="Sulat ka dito nak... 💭"></textarea>
    <h2>⏱ Pomodoro</h2>
    <div style="text-align:center; margin:15px 0;">
      <img src="images/hello-kitty-study.png" style="width:140px; margin-bottom:10px;" alt="kitty studying">
      <p style="color:#ff9fcf; font-weight:600;">Word Hard Vro! ♡</p>
    </div>
    <input id="activityInput" placeholder="What are you working on right now?">
    <div class="timer" id="timer">25:00</div>
    <button onclick="startPomodoro()">Start Your Session 🎀</button>
    <button onclick="pausePomodoro()">Pause ⏸️</button>
    <button onclick="resetPomodoro()">Reset ♡</button>
    <button onclick="testSound()" style="background:#ffb6c1; margin-left:10px;">Test Sound ♡</button>
    <ul id="log" style="list-style:none; padding:0; margin-top:15px;"></ul>
    <button onclick="toggleCustomizer()" style="margin-top:20px; background:#ff69b4;">✨ Customize Stickers</button>
    <div id="customizer">
      <h2 style="margin-top:0;">🎀 Change Your Stickers!</h2>
      <p style="font-size:0.9rem; color:#888;">File names or URLs ♡</p>
      <label>Hello Kitty main:</label><input id="img1" value="hello-kitty.png">
      <label>My Melody:</label><input id="img2" value="my-melody.png">
      <label>Cinnamoroll:</label><input id="img3" value="cinnamoroll.png">
      <label>Kuromi:</label><input id="img4" value="kuromi.png">
      <label>Extra Hello Kitty:</label><input id="img5" value="hello-kitty2.png">
      <label>Study Kitty:</label><input id="imgStudy" value="hello-kitty-study.png">
      <button onclick="updateImages()" style="background:#ff69b4; margin-top:15px;">Update ♡</button>
    </div>
  </div>
</div>

<!-- FLOATING STICKERS -->
<img src="images/hello-kitty.png" class="sticker" style="bottom:30px;right:40px;">
<img src="images/my-melody.png" class="sticker" style="top:80px;left:50px;width:90px;animation-delay:1s;">
<img src="images/cinnamoroll.png" class="sticker" style="bottom:120px;left:60px;width:70px;animation-delay:2s;">
<img src="images/kuromi.png" class="sticker" style="top:150px;right:70px;width:85px;animation-delay:3s;">
<img src="images/hello-kitty2.png" class="sticker" style="bottom:200px;right:150px;width:60px;animation-delay:1.5s;">

<!-- Pomodoro Finish Sound -->
<audio id="finishSound" preload="auto">
  <source src="sounds/finish.mp3" type="audio/mpeg">
  Your browser doesn't support audio.
</audio>

<script src="decks.js"></script>
<script>
// ──────────────────────────────────────────────
// Flashcard logic with image toggle + skip image-only cards when images off
// ──────────────────────────────────────────────

function normalize(str) {
  return str.normalize("NFD").replace(/[\u0300-\u036f]/g, "").toLowerCase().trim();
}

let currentDeck = [];
let shuffledDeck = [];
let index = 0;
let score = 0;
let answered = false;
let currentMode = 'multiple';

// Image toggle
let showImages = localStorage.getItem('showImages') !== 'false'; // default true

const toggleImagesCheckbox = document.getElementById("toggleImages");
if (toggleImagesCheckbox) {
  toggleImagesCheckbox.checked = showImages;
  toggleImagesCheckbox.onchange = () => {
    showImages = toggleImagesCheckbox.checked;
    localStorage.setItem('showImages', showImages);
    showQuestion(); // refresh current card
  };
}

// Milestone GIFs
const milestones = [50, 100, 200, 1000];
const milestoneGifs = {
  50: "https://tenor.com/view/speed-ishowspeed-speed-stream-ishowspeed-stream-speed-nod-gif-1082323842437565509",
  100: "https://tenor.com/view/scream-showspeed-jumpscare-gif-24381763",
  200: "https://tenor.com/view/speed-ishowspeed-ishowspeed-jump-jump-at-camera-gif-13692130268687196891",
  1000: "https://tenor.com/view/ishowspeed-speed-ishowspeed-pc-speed-pc-ishowspeed-silly-gif-11299080907485356235"
};
let playedMilestones = new Set();

const mainTopicSelect = document.getElementById("mainTopicSelect");
const subjectSelect   = document.getElementById("subjectSelect");
const deckSelect      = document.getElementById("deckSelect");
const modeSelect      = document.getElementById("modeSelect");
const questionEl      = document.getElementById("question");
const choicesEl       = document.getElementById("choices");
const typedArea       = document.getElementById("typedArea");
const typedInput      = document.getElementById("typedAnswer");
const feedbackEl      = document.getElementById("feedback");
const scoreEl         = document.getElementById("score");
const savedScoreEl    = document.getElementById("savedScore");
const nextBtn         = document.getElementById("nextBtn");

// Populate main topics
function populateMainTopics() {
  mainTopicSelect.innerHTML = '<option value="">-- Select Course / Region --</option>';
  mainTopics.sort().forEach(topic => {
    const opt = document.createElement("option");
    opt.value = topic;
    opt.textContent = topic;
    mainTopicSelect.appendChild(opt);
  });
}

// Update subjects
function updateSubjects() {
  const topic = mainTopicSelect.value;
  subjectSelect.innerHTML = '<option value="">-- Select Subject / Period --</option>';
  subjectSelect.disabled = !topic;
  if (topic && mainToSubjects[topic]) {
    mainToSubjects[topic].sort().forEach(sub => {
      const opt = document.createElement("option");
      opt.value = `${topic}_${sub}`;
      opt.textContent = sub;
      subjectSelect.appendChild(opt);
    });
  }
  updateDecks();
}

// Update decks
function updateDecks() {
  const subjectKey = subjectSelect.value;
  deckSelect.innerHTML = '<option value="">-- Select Deck --</option>';
  deckSelect.disabled = !subjectKey;
  if (subjectKey && subjectToDecks[subjectKey]) {
    subjectToDecks[subjectKey].sort().forEach(deckName => {
      const fullKey = `${subjectKey}_${deckName}`;
      const display = deckName.replace(/_/g, " ").toUpperCase() + " ♡";
      const opt = document.createElement("option");
      opt.value = fullKey;
      opt.textContent = display;
      deckSelect.appendChild(opt);
    });
  }
}

function shuffleArray(array) {
  const copy = [...array];
  for (let i = copy.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [copy[i], copy[j]] = [copy[j], copy[i]];
  }
  return copy;
}

function loadDeck() {
  const deckKey = deckSelect.value;
  if (!deckKey) return;
  currentDeck = decks[deckKey] || [];
  shuffledDeck = shuffleArray(currentDeck);
  index = 0;
  score = parseInt(localStorage.getItem(`score_${deckKey}`)) || 0;
  scoreEl.textContent = score;
  savedScoreEl.textContent = `(saved: ${score})`;
  answered = false;
  nextBtn.disabled = true;
  showQuestion();
}

function showQuestion() {
  if (!shuffledDeck.length) {
    questionEl.innerHTML = "No cards in this deck yet... add some in decks.js! 💕";
    choicesEl.innerHTML = "";
    typedArea.style.display = "none";
    nextBtn.disabled = true;
    return;
  }

  // Clear everything
  questionEl.innerHTML = '';
  choicesEl.innerHTML = "";
  typedArea.style.display = "none";
  feedbackEl.textContent = "";
  answered = false;
  nextBtn.disabled = true;

  let card = shuffledDeck[index];
  let term = card[0] || '';
  let description = card[1] || '';
  let image = card[2] || '';

  // If images toggled OFF and card has NO description (image-only), skip it
  if (!showImages && !description.trim()) {
    index++;
    if (index >= shuffledDeck.length) {
      index = 0;
      shuffledDeck = shuffleArray(currentDeck);
      const msg = document.createElement("div");
      msg.style.color = "#ff7fbf";
      msg.style.fontWeight = "bold";
      msg.style.margin = "12px 0";
      msg.style.fontSize = "1.2rem";
      msg.textContent = "✦ Skipped image-only cards ♡ New round started!";
      questionEl.prepend(msg);
      setTimeout(() => { if (msg.parentNode) msg.remove(); }, 5000);
    }
    showQuestion(); // recurse to next valid card
    return;
  }

  // Progress
  const progress = document.createElement("div");
  progress.style.fontSize = "1rem";
  progress.style.color = "#ff9fcf";
  progress.style.marginBottom = "12px";
  progress.style.fontWeight = "600";
  progress.textContent = `Card ${index + 1} of ${shuffledDeck.length}`;
  questionEl.appendChild(progress);

  // Container for image + text
  const qContainer = document.createElement("div");
  qContainer.style.textAlign = "center";
  qContainer.style.marginBottom = "20px";

  // Only show image if toggle is ON
  if (image && showImages) {
    const img = document.createElement("img");
    img.src = image;
    img.className = "question-img";
    img.alt = "Visual example";
    qContainer.appendChild(img);
  }

  const txt = document.createElement("span");
  txt.style.fontSize = "1.4rem";
  txt.style.display = "block";
  txt.style.marginTop = (image && showImages) ? "15px" : "0";

  const allTerms = currentDeck.map(c => c[0]).filter(t => t);
  const allDescriptions = currentDeck.map(c => c[1]).filter(d => d);

  if (currentMode === 'multiple') {
    txt.textContent = term || "No term available";
    let options = [description];
    let distractors = allDescriptions.filter(d => d !== description);
    while (options.length < 4 && distractors.length > 0) {
      const randIndex = Math.floor(Math.random() * distractors.length);
      options.push(distractors[randIndex]);
      distractors.splice(randIndex, 1);
    }
    options = shuffleArray(options);
    options.forEach(ch => {
      const btn = document.createElement("button");
      btn.textContent = ch;
      btn.onclick = () => checkAnswer(ch, description, btn);
      choicesEl.appendChild(btn);
    });
  }
  else if (currentMode === 'reversed') {
    txt.textContent = description || "No description available";
    let correctTerm = term || description;
    let options = [correctTerm];
    let distractors = allTerms.filter(t => t !== correctTerm);
    while (options.length < 4 && distractors.length > 0) {
      const randIndex = Math.floor(Math.random() * distractors.length);
      const distractor = distractors[randIndex];
      if (!options.includes(distractor)) {
        options.push(distractor);
      }
      distractors.splice(randIndex, 1);
    }
    options = shuffleArray(options);
    options.forEach(ch => {
      const btn = document.createElement("button");
      btn.textContent = ch;
      btn.onclick = () => checkAnswer(ch, correctTerm, btn);
      choicesEl.appendChild(btn);
    });
  }
  else if (currentMode === 'identification') {
    typedArea.style.display = "block";
    typedInput.value = "";
    typedInput.focus();
    if (description) {
      txt.textContent = description;
    } else {
      txt.textContent = "Describe or name what you see ♡";
    }
  }

  qContainer.appendChild(txt);
  questionEl.appendChild(qContainer);
}

function checkAnswer(choice, correct, btn) {
  if (answered) return;
  answered = true;
  nextBtn.disabled = false;
  if (choice === correct) {
    score++;
    scoreEl.textContent = score;
    savedScoreEl.textContent = `(saved: ${score})`;
    localStorage.setItem(`score_${deckSelect.value}`, score);
    sparkle();
    btn.style.background = "#c3f0c8";
    btn.style.border = "3px solid #4caf50";

    if (milestones.includes(score) && !playedMilestones.has(score)) {
      playedMilestones.add(score);
      showMilestoneGif(score);
    }
  } else {
    btn.style.background = "#ffcccc";
    btn.style.border = "3px solid #e74c3c";
    [...choicesEl.children].forEach(b => {
      if (b.textContent === correct) {
        b.style.background = "#c3f0c8";
        b.style.border = "3px solid #4caf50";
      }
    });
  }
}

function checkTyped() {
  if (answered) return;
  const user = normalize(typedInput.value);
  const correct = normalize(shuffledDeck[index][0]);
  answered = true;
  nextBtn.disabled = false;
  if (user === correct) {
    score++;
    scoreEl.textContent = score;
    savedScoreEl.textContent = `(saved: ${score})`;
    localStorage.setItem(`score_${deckSelect.value}`, score);
    sparkle();
    feedbackEl.innerHTML = "Correct! 🌸💖";
    feedbackEl.style.color = "#4caf50";

    if (milestones.includes(score) && !playedMilestones.has(score)) {
      playedMilestones.add(score);
      showMilestoneGif(score);
    }
  } else {
    feedbackEl.innerHTML = `No... it's <strong>${shuffledDeck[index][0]}</strong>`;
    feedbackEl.style.color = "#e74c3c";
  }
}

function showMilestoneGif(points) {
  const postIds = {
    50: "1082323842437565509",
    100: "24381763",
    200: "13692130268687196891",
    1000: "11299080907485356235"
  };

  const postId = postIds[points];
  if (!postId) return;

  const modal = document.createElement("div");
  modal.className = "milestone-modal";

  const gifEmbed = document.createElement("div");
  gifEmbed.className = "tenor-gif-embed";
  gifEmbed.setAttribute("data-postid", postId);
  gifEmbed.setAttribute("data-share-method", "host");
  gifEmbed.setAttribute("data-aspect-ratio", "1");
  gifEmbed.setAttribute("data-width", "80%");
  gifEmbed.innerHTML = `<a href="https://tenor.com/view/${postId}">Loading...</a>`;

  const script = document.createElement("script");
  script.async = true;
  script.src = "https://tenor.com/embed.js";

  const closeText = document.createElement("div");
  closeText.className = "close-text";
  closeText.textContent = "Tap anywhere to continue ♡";

  modal.appendChild(gifEmbed);
  modal.appendChild(script);
  modal.appendChild(closeText);

  modal.onclick = () => modal.remove();

  document.body.appendChild(modal);

  setTimeout(() => {
    if (modal.parentNode) modal.remove();
  }, 7000);
}

function nextQuestion() {
  index++;
  if (index >= shuffledDeck.length) {
    index = 0;
    shuffledDeck = shuffleArray(currentDeck);
    const msg = document.createElement("div");
    msg.style.color = "#ff7fbf";
    msg.style.fontWeight = "bold";
    msg.style.margin = "12px 0";
    msg.style.fontSize = "1.2rem";
    msg.textContent = "✦ New round started! ♡ Keep going cutie~";
    questionEl.prepend(msg);
    setTimeout(() => { if (msg.parentNode) msg.remove(); }, 5000);
  }
  showQuestion();
}

function sparkle() {
  const emojis = ["✨","🌸","💖","🎀","🐱","🍓","🍰","❤️","🌟","♡"];
  for (let i = 0; i < 3; i++) {
    setTimeout(() => {
      const s = document.createElement("div");
      s.className = "sparkle";
      s.textContent = emojis[Math.floor(Math.random() * emojis.length)];
      s.style.left = Math.random() * window.innerWidth + "px";
      s.style.top = Math.random() * window.innerHeight + "px";
      document.body.appendChild(s);
      setTimeout(() => s.remove(), 800);
    }, i * 150);
  }
}

// Pomodoro functions (unchanged)
let time = 1500;
let interval = null;
let isPaused = false;

function startPomodoro() {
  if (interval || isPaused) return;
  interval = setInterval(() => {
    if (time <= 0) {
      clearInterval(interval);
      interval = null;
      isPaused = false;
      logSession();
      alert("Great job girl ♡");
      return;
    }
    time--;
    updateTimer();
  }, 1000);
  document.querySelector('button[onclick="pausePomodoro()"]').textContent = "Pause ⏸️";
}

function pausePomodoro() {
  if (!interval && !isPaused) return;
  if (interval) {
    clearInterval(interval);
    interval = null;
    isPaused = true;
    document.querySelector('button[onclick="pausePomodoro()"]').textContent = "Resume ▶️";
  } else if (isPaused) {
    isPaused = false;
    startPomodoro();
  }
}

function resetPomodoro() {
  clearInterval(interval);
  interval = null;
  isPaused = false;
  time = 1500;
  updateTimer();
  document.querySelector('button[onclick="pausePomodoro()"]').textContent = "Pause ⏸️";
}

function updateTimer() {
  const m = String(Math.floor(time/60)).padStart(2,"0");
  const s = String(time%60).padStart(2,"0");
  document.getElementById("timer").textContent = `${m}:${s}`;
}

function logSession() {
  const text = document.getElementById("activityInput").value.trim() || "Kawaii Study Time";
  const li = document.createElement("li");
  li.textContent = `25 min – ${text} 🎀`;
  li.style.margin = "8px 0";
  document.getElementById("log").appendChild(li);
  const sound = document.getElementById("finishSound");
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function testSound() {
  const sound = document.getElementById("finishSound");
  sound.currentTime = 0;
  sound.play().catch(() => {});
}

function toggleCustomizer() {
  document.getElementById("customizer").classList.toggle("show");
}

function updateImages() {
  document.querySelectorAll('.sticker').forEach((s,i) => {
    const v = document.getElementById(`img${i+1}`).value;
    if (v) s.src = v;
  });
  const study = document.querySelector('.card img[src*="hello-kitty-study"]');
  if (study) study.src = document.getElementById("imgStudy").value;
  sparkle();
}

// Event listeners
mainTopicSelect.onchange = updateSubjects;
subjectSelect.onchange = updateDecks;
deckSelect.onchange = loadDeck;
modeSelect.onchange = () => { currentMode = modeSelect.value; showQuestion(); };

// Init
populateMainTopics();
</script>
</body>
</html>
